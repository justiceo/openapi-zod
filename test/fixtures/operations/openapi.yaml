openapi: 3.1.0
info:
  title: Operations
  version: 1.0.0
servers:
  - url: https://api.example.test
tags:
  - name: Users
paths:
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getUser
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: includePosts
          in: query
          schema:
            type: boolean
        - name: X-Request-Id
          in: header
          schema:
            type: string
      responses:
        "200":
          description: User response
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: updateUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "204":
          description: Updated
components:
  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
