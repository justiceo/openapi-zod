openapi: 3.1.0
info:
  title: Inline Checkout API
  version: 1.0.0
paths:
  /orders:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer
                - items
              properties:
                customer:
                  type: object
                  required:
                    - email
                  properties:
                    email:
                      type: string
                      format: email
                    metadata:
                      type: object
                      additionalProperties:
                        type: string
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - sku
                      - quantity
                    properties:
                      sku:
                        type: string
                      quantity:
                        type: integer
                        minimum: 1
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - status
                properties:
                  id:
                    type: string
                  status:
                    enum:
                      - accepted
                      - queued
components:
  schemas:
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
