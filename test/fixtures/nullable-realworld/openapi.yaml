openapi: 3.0.3
info:
  title: Nullable Profile API
  version: 1.0.0
paths:
  /profiles/{id}:
    patch:
      operationId: updateProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilePatch"
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
components:
  schemas:
    Profile:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
    ProfilePatch:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
